<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0A20"/>
      <stop offset="100%" stop-color="#06060A"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B7DFF"/>
      <stop offset="50%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#7B61FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B61FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(123,97,255,0.07)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(123,97,255,0.07)" stroke-width="1"/>

  <!-- Glow orb -->
  <circle cx="200" cy="315" r="300" fill="url(#glow)"/>

  <!-- Bug icon — large left side -->
  <path d="M200 178 L312 243 L312 373 L200 438 L88 373 L88 243 Z" fill="url(#primary)" opacity="0.1"/>
  <path d="M200 178 L312 243 L312 373 L200 438 L88 373 L88 243 Z" stroke="url(#primary)" stroke-width="3" fill="none"/>
  <rect x="58" y="300" width="284" height="9" rx="4.5" fill="url(#scan)" opacity="0.9"/>

  <!-- Antennae -->
  <line x1="122" y1="242" x2="67" y2="187" stroke="#9B7DFF" stroke-width="4" stroke-linecap="round"/>
  <circle cx="67" cy="187" r="12" fill="#1A1530"/>
  <circle cx="67" cy="187" r="12" stroke="#9B7DFF" stroke-width="3"/>
  <circle cx="67" cy="187" r="5" fill="#9B7DFF"/>
  <line x1="278" y1="242" x2="333" y2="187" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <circle cx="333" cy="187" r="12" fill="#1A1530"/>
  <circle cx="333" cy="187" r="12" stroke="#00E5FF" stroke-width="3"/>
  <circle cx="333" cy="187" r="5" fill="#00E5FF"/>

  <!-- Legs left -->
  <line x1="88" y1="275" x2="40" y2="258" stroke="#7B61FF" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <line x1="88" y1="308" x2="28" y2="308" stroke="#7B61FF" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <line x1="88" y1="341" x2="40" y2="358" stroke="#7B61FF" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <circle cx="40" cy="258" r="5" fill="#7B61FF" opacity="0.5"/>
  <circle cx="28" cy="308" r="5" fill="#7B61FF" opacity="0.5"/>
  <circle cx="40" cy="358" r="5" fill="#7B61FF" opacity="0.5"/>

  <!-- Legs right -->
  <line x1="312" y1="275" x2="360" y2="258" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <line x1="312" y1="308" x2="372" y2="308" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <line x1="312" y1="341" x2="360" y2="358" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <circle cx="360" cy="258" r="5" fill="#00E5FF" opacity="0.5"/>
  <circle cx="372" cy="308" r="5" fill="#00E5FF" opacity="0.5"/>
  <circle cx="360" cy="358" r="5" fill="#00E5FF" opacity="0.5"/>

  <!-- Eyes -->
  <circle cx="172" cy="270" r="12" fill="#00E5FF" opacity="0.85"/>
  <circle cx="172" cy="270" r="5" fill="white"/>
  <circle cx="228" cy="270" r="12" fill="#9B7DFF" opacity="0.85"/>
  <circle cx="228" cy="270" r="5" fill="white"/>

  <!-- Core -->
  <circle cx="200" cy="305" r="24" fill="url(#primary)"/>
  <circle cx="200" cy="305" r="11" fill="white" opacity="0.95"/>

  <!-- Text section -->
  <text x="460" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="800" fill="white" letter-spacing="-3">TraceBug</text>
  <text x="460" y="316" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#8888A8" letter-spacing="-0.5">Automatic Bug Reporting for Developers</text>

  <!-- Divider line -->
  <rect x="460" y="346" width="320" height="2.5" rx="1.25" fill="url(#scan)" opacity="0.7"/>

  <!-- npm command -->
  <rect x="460" y="376" width="460" height="52" rx="10" fill="rgba(123,97,255,0.08)" stroke="rgba(123,97,255,0.2)" stroke-width="1"/>
  <text x="484" y="410" font-family="monospace" font-size="22" fill="#7B61FF">$ npm install tracebug-sdk</text>

  <!-- Tags -->
  <rect x="460" y="450" width="148" height="32" rx="6" fill="rgba(0,229,255,0.1)" stroke="rgba(0,229,255,0.25)" stroke-width="1"/>
  <text x="484" y="471" font-family="monospace" font-size="14" fill="#00E5FF">Zero Backend</text>

  <rect x="620" y="450" width="120" height="32" rx="6" fill="rgba(123,97,255,0.1)" stroke="rgba(123,97,255,0.25)" stroke-width="1"/>
  <text x="644" y="471" font-family="monospace" font-size="14" fill="#9B7DFF">Browser Only</text>

  <rect x="752" y="450" width="80" height="32" rx="6" fill="rgba(0,255,163,0.1)" stroke="rgba(0,255,163,0.25)" stroke-width="1"/>
  <text x="775" y="471" font-family="monospace" font-size="14" fill="#00FFA3">Free</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(123,97,255,0.06)"/>
  <text x="460" y="616" font-family="monospace" font-size="16" fill="#555570">tracebug.netlify.app · Debug faster. Ship better.</text>
</svg>
