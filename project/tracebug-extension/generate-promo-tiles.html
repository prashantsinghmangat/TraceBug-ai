<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>TraceBug — Promo Tiles for Chrome Web Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0B0B0F;color:#E8EAED;font-family:'Inter',sans-serif;padding:2rem}
  h1{font-size:1.5rem;margin-bottom:0.3rem}
  .sub{color:#6B6B80;font-size:0.85rem;font-family:'JetBrains Mono',monospace;margin-bottom:2rem}
  .tiles{display:flex;flex-direction:column;gap:2.5rem}
  .tile-wrapper{position:relative}
  .tile-label{font-size:0.75rem;color:#7B61FF;font-family:'JetBrains Mono',monospace;margin-bottom:8px}
  .tile-size{font-size:0.65rem;color:#6B6B80;font-family:'JetBrains Mono',monospace;margin-bottom:8px}
  canvas{border:1px solid #1E1E2E;border-radius:8px;display:block}
  .actions{margin-top:2rem;display:flex;gap:1rem;flex-wrap:wrap}
  button{background:#7B61FF;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600;font-family:'Inter',sans-serif}
  button:hover{background:#6A50EE}
</style>
</head>
<body>
<h1>Chrome Web Store Promo Tiles</h1>
<p class="sub">Small promo (440x280) + Marquee (1400x560) — JPEG, no alpha</p>

<div class="tiles" id="tiles"></div>

<div class="actions">
  <button onclick="downloadTile('small')">Download Small Promo (440x280)</button>
  <button onclick="downloadTile('marquee')">Download Marquee (1400x560)</button>
  <button onclick="downloadTile('small'); setTimeout(()=>downloadTile('marquee'), 500)">Download Both</button>
</div>

<script>
const COLORS = {
  bg: '#0B0B0F', bg2: '#13131A', bg3: '#16161E',
  primary: '#7B61FF', cyan: '#00E5FF', lavender: '#9B7DFF',
  red: '#FF4D6D', green: '#00FFA3', yellow: '#FFD166',
  border: '#1E1E2E', muted: '#6B6B80', text: '#E8EAED',
  textDim: '#8892A4'
};

const canvases = {};

function createCanvas(id, label, w, h) {
  const wrapper = document.createElement('div');
  wrapper.className = 'tile-wrapper';
  const lbl = document.createElement('div');
  lbl.className = 'tile-label';
  lbl.textContent = label;
  const sz = document.createElement('div');
  sz.className = 'tile-size';
  sz.textContent = `${w} × ${h}px`;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.id = id;
  wrapper.appendChild(lbl);
  wrapper.appendChild(sz);
  wrapper.appendChild(canvas);
  document.getElementById('tiles').appendChild(wrapper);
  canvases[id] = canvas;
  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawBugIcon(ctx, cx, cy, scale) {
  const f = scale;
  ctx.save();
  ctx.translate(cx - 40*f, cy - 34*f);

  // Body hex
  ctx.beginPath();
  ctx.moveTo(40*f,15*f); ctx.lineTo(57*f,25*f); ctx.lineTo(57*f,44*f);
  ctx.lineTo(40*f,54*f); ctx.lineTo(23*f,44*f); ctx.lineTo(23*f,25*f); ctx.closePath();
  ctx.fillStyle = 'rgba(123,97,255,0.15)'; ctx.fill();
  const bodyGrad = ctx.createLinearGradient(23*f,15*f,57*f,54*f);
  bodyGrad.addColorStop(0,'#9B7DFF'); bodyGrad.addColorStop(1,'#00E5FF');
  ctx.strokeStyle = bodyGrad; ctx.lineWidth = Math.max(1,1.8*f); ctx.stroke();

  // Scan line
  const scanGrad = ctx.createLinearGradient(15*f,0,65*f,0);
  scanGrad.addColorStop(0,'rgba(0,229,255,0)'); scanGrad.addColorStop(0.3,'rgba(0,229,255,0.9)');
  scanGrad.addColorStop(0.7,'rgba(123,97,255,0.9)'); scanGrad.addColorStop(1,'rgba(123,97,255,0)');
  ctx.fillStyle = scanGrad;
  roundRect(ctx,15*f,33.5*f,50*f,2.5*f,1.25*f); ctx.fill();

  ctx.lineCap = 'round';

  // Left antenna
  ctx.beginPath(); ctx.moveTo(27*f,24*f); ctx.lineTo(17*f,14*f);
  ctx.strokeStyle='#9B7DFF'; ctx.lineWidth=Math.max(1,2*f); ctx.stroke();
  ctx.beginPath(); ctx.arc(17*f,14*f,3*f,0,Math.PI*2);
  ctx.fillStyle='#9B7DFF'; ctx.fill();
  ctx.beginPath(); ctx.arc(17*f,14*f,1.2*f,0,Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.fill();

  // Right antenna
  ctx.beginPath(); ctx.moveTo(53*f,24*f); ctx.lineTo(63*f,14*f);
  ctx.strokeStyle='#00E5FF'; ctx.lineWidth=Math.max(1,2*f); ctx.stroke();
  ctx.beginPath(); ctx.arc(63*f,14*f,3*f,0,Math.PI*2);
  ctx.fillStyle='#00E5FF'; ctx.fill();
  ctx.beginPath(); ctx.arc(63*f,14*f,1.2*f,0,Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.fill();

  // Legs left
  const lw = Math.max(1,1.5*f);
  ctx.globalAlpha=0.8;
  [[23,30,13,27],[23,37,11,37],[23,44,13,47]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1*f,y1*f);ctx.lineTo(x2*f,y2*f);ctx.strokeStyle='#7B61FF';ctx.lineWidth=lw;ctx.stroke();
  });
  // Legs right
  [[57,30,67,27],[57,37,69,37],[57,44,67,47]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1*f,y1*f);ctx.lineTo(x2*f,y2*f);ctx.strokeStyle='#00E5FF';ctx.lineWidth=lw;ctx.stroke();
  });
  ctx.globalAlpha=1;

  // Eyes
  ctx.globalAlpha=0.9;
  ctx.beginPath(); ctx.arc(34*f,28*f,2.2*f,0,Math.PI*2); ctx.fillStyle='#00E5FF'; ctx.fill();
  ctx.beginPath(); ctx.arc(34*f,28*f,0.9*f,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.beginPath(); ctx.arc(46*f,28*f,2.2*f,0,Math.PI*2); ctx.fillStyle='#9B7DFF'; ctx.fill();
  ctx.beginPath(); ctx.arc(46*f,28*f,0.9*f,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.globalAlpha=1;

  // Core
  ctx.beginPath(); ctx.arc(40*f,34*f,4*f,0,Math.PI*2);
  const cg=ctx.createLinearGradient(36*f,30*f,44*f,38*f);
  cg.addColorStop(0,'#9B7DFF');cg.addColorStop(1,'#00E5FF');
  ctx.fillStyle=cg; ctx.fill();
  ctx.beginPath(); ctx.arc(40*f,34*f,1.8*f,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  ctx.restore();
}

function drawGlowOrbs(ctx, w, h) {
  // Purple glow left
  const g1 = ctx.createRadialGradient(w*0.2, h*0.5, 0, w*0.2, h*0.5, w*0.35);
  g1.addColorStop(0, 'rgba(123,97,255,0.12)');
  g1.addColorStop(1, 'rgba(123,97,255,0)');
  ctx.fillStyle = g1; ctx.fillRect(0,0,w,h);

  // Cyan glow right
  const g2 = ctx.createRadialGradient(w*0.8, h*0.4, 0, w*0.8, h*0.4, w*0.3);
  g2.addColorStop(0, 'rgba(0,229,255,0.08)');
  g2.addColorStop(1, 'rgba(0,229,255,0)');
  ctx.fillStyle = g2; ctx.fillRect(0,0,w,h);
}

function drawGrid(ctx, w, h, spacing, opacity) {
  ctx.strokeStyle = `rgba(123,97,255,${opacity})`;
  ctx.lineWidth = 0.5;
  for(let i=0;i<w;i+=spacing){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,h);ctx.stroke();}
  for(let i=0;i<h;i+=spacing){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(w,i);ctx.stroke();}
}

function drawFeaturePill(ctx, text, x, y, color) {
  ctx.font = '600 11px Inter';
  const tw = ctx.measureText(text).width + 16;
  ctx.fillStyle = color + '18';
  roundRect(ctx, x, y, tw, 24, 12); ctx.fill();
  ctx.strokeStyle = color + '35';
  ctx.lineWidth = 1;
  roundRect(ctx, x, y, tw, 24, 12); ctx.stroke();
  ctx.fillStyle = color;
  ctx.fillText(text, x+8, y+16);
  return tw + 6;
}


// ═══════════════════════════════════════════════════════════
//  SMALL PROMO TILE — 440 x 280
// ═══════════════════════════════════════════════════════════
(function() {
  const W = 440, H = 280;
  const c = createCanvas('small', 'Small Promo Tile', W, H);
  const ctx = c.getContext('2d');

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#0E0A20');
  bgGrad.addColorStop(0.5, '#0B0B0F');
  bgGrad.addColorStop(1, '#060A14');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Grid
  drawGrid(ctx, W, H, 40, 0.04);

  // Glow orbs
  drawGlowOrbs(ctx, W, H);

  // Bug icon — centered left area
  drawBugIcon(ctx, 100, 115, 1.5);

  // Text — right side
  const tx = 200;

  // "TraceBug" wordmark
  ctx.font = '800 26px Inter';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('TraceBug', tx, 85);

  // Tagline
  ctx.font = '500 12px Inter';
  ctx.fillStyle = COLORS.cyan;
  ctx.fillText('QA Bug Reporter', tx, 108);

  // Headline
  ctx.font = '700 16px Inter';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('Debug Bugs in', tx, 148);
  ctx.fillText('Seconds — Not Hours', tx, 168);

  // Feature pills
  let px = tx;
  const pillY = 190;
  px += drawFeaturePill(ctx, 'Session Recording', px, pillY, COLORS.primary);
  px += drawFeaturePill(ctx, 'Auto Reports', px, pillY, COLORS.cyan);

  px = tx;
  const pillY2 = 220;
  px += drawFeaturePill(ctx, 'Screenshots', px, pillY2, COLORS.green);
  px += drawFeaturePill(ctx, 'GitHub & Jira', px, pillY2, COLORS.lavender);

  // Bottom accent line
  const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
  lineGrad.addColorStop(0, 'rgba(0,229,255,0)');
  lineGrad.addColorStop(0.3, 'rgba(0,229,255,0.6)');
  lineGrad.addColorStop(0.7, 'rgba(123,97,255,0.6)');
  lineGrad.addColorStop(1, 'rgba(123,97,255,0)');
  ctx.fillStyle = lineGrad;
  ctx.fillRect(0, H-3, W, 3);

  // "Zero Backend" badge top-right
  ctx.fillStyle = COLORS.green + '15';
  roundRect(ctx, W-135, 16, 120, 22, 11); ctx.fill();
  ctx.strokeStyle = COLORS.green + '30'; ctx.lineWidth = 1;
  roundRect(ctx, W-135, 16, 120, 22, 11); ctx.stroke();
  ctx.font = '600 10px JetBrains Mono';
  ctx.fillStyle = COLORS.green;
  ctx.fillText('Zero Backend', W-125, 31);

  // Chrome Extension badge top-left
  ctx.fillStyle = COLORS.primary + '15';
  roundRect(ctx, 16, 16, 130, 22, 11); ctx.fill();
  ctx.strokeStyle = COLORS.primary + '30'; ctx.lineWidth = 1;
  roundRect(ctx, 16, 16, 130, 22, 11); ctx.stroke();
  ctx.font = '600 10px JetBrains Mono';
  ctx.fillStyle = COLORS.primary;
  ctx.fillText('Chrome Extension', 26, 31);
})();


// ═══════════════════════════════════════════════════════════
//  MARQUEE PROMO TILE — 1400 x 560
// ═══════════════════════════════════════════════════════════
(function() {
  const W = 1400, H = 560;
  const c = createCanvas('marquee', 'Marquee Promo Tile', W, H);
  const ctx = c.getContext('2d');

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#0E0A20');
  bgGrad.addColorStop(0.4, '#0B0B0F');
  bgGrad.addColorStop(1, '#060A14');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Grid
  drawGrid(ctx, W, H, 50, 0.03);

  // Glow orbs — larger, more dramatic
  const g1 = ctx.createRadialGradient(250, 280, 0, 250, 280, 350);
  g1.addColorStop(0, 'rgba(123,97,255,0.15)');
  g1.addColorStop(1, 'rgba(123,97,255,0)');
  ctx.fillStyle = g1; ctx.fillRect(0,0,W,H);

  const g2 = ctx.createRadialGradient(1100, 250, 0, 1100, 250, 300);
  g2.addColorStop(0, 'rgba(0,229,255,0.08)');
  g2.addColorStop(1, 'rgba(0,229,255,0)');
  ctx.fillStyle = g2; ctx.fillRect(0,0,W,H);

  const g3 = ctx.createRadialGradient(700, 500, 0, 700, 500, 250);
  g3.addColorStop(0, 'rgba(155,125,255,0.06)');
  g3.addColorStop(1, 'rgba(155,125,255,0)');
  ctx.fillStyle = g3; ctx.fillRect(0,0,W,H);

  // ── Left side: Bug icon large ──
  drawBugIcon(ctx, 200, 260, 3.2);

  // ── Center: Main text ──
  const tx = 440;

  // Top badge row
  let bx = tx;
  ctx.fillStyle = COLORS.green + '15';
  roundRect(ctx, bx, 80, 110, 28, 14); ctx.fill();
  ctx.strokeStyle = COLORS.green + '30'; ctx.lineWidth = 1;
  roundRect(ctx, bx, 80, 110, 28, 14); ctx.stroke();
  ctx.font = '600 12px JetBrains Mono'; ctx.fillStyle = COLORS.green;
  ctx.fillText('Zero Backend', bx+12, 99);

  bx += 122;
  ctx.fillStyle = COLORS.primary + '15';
  roundRect(ctx, bx, 80, 110, 28, 14); ctx.fill();
  ctx.strokeStyle = COLORS.primary + '30'; ctx.lineWidth = 1;
  roundRect(ctx, bx, 80, 110, 28, 14); ctx.stroke();
  ctx.font = '600 12px JetBrains Mono'; ctx.fillStyle = COLORS.primary;
  ctx.fillText('Browser Only', bx+12, 99);

  bx += 122;
  ctx.fillStyle = COLORS.cyan + '15';
  roundRect(ctx, bx, 80, 55, 28, 14); ctx.fill();
  ctx.strokeStyle = COLORS.cyan + '30'; ctx.lineWidth = 1;
  roundRect(ctx, bx, 80, 55, 28, 14); ctx.stroke();
  ctx.font = '600 12px JetBrains Mono'; ctx.fillStyle = COLORS.cyan;
  ctx.fillText('Free', bx+14, 99);

  // Main headline
  ctx.font = '900 54px Inter';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('Debug Bugs in Seconds', tx, 185);

  // Gradient text for second line
  const gradText = ctx.createLinearGradient(tx, 0, tx + 500, 0);
  gradText.addColorStop(0, '#9B7DFF');
  gradText.addColorStop(0.5, '#7B61FF');
  gradText.addColorStop(1, '#00E5FF');
  ctx.font = '900 54px Inter';
  ctx.fillStyle = gradText;
  ctx.fillText('— Not Hours', tx, 245);

  // Subheadline
  ctx.font = '400 18px Inter';
  ctx.fillStyle = COLORS.textDim;
  ctx.fillText('TraceBug records user actions, console errors, network calls, and', tx, 295);
  ctx.fillText('screenshots to generate developer-ready bug reports automatically.', tx, 320);

  // npm install line
  ctx.fillStyle = COLORS.bg2;
  roundRect(ctx, tx, 355, 320, 40, 8); ctx.fill();
  ctx.strokeStyle = COLORS.border; ctx.lineWidth = 1;
  roundRect(ctx, tx, 355, 320, 40, 8); ctx.stroke();
  ctx.font = '600 14px JetBrains Mono'; ctx.fillStyle = COLORS.muted;
  ctx.fillText('$', tx+14, 380);
  ctx.fillStyle = COLORS.cyan;
  ctx.fillText('npm install tracebug-sdk', tx+30, 380);

  // CTA buttons
  ctx.fillStyle = COLORS.primary;
  roundRect(ctx, tx, 415, 220, 44, 10); ctx.fill();
  ctx.font = '600 15px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Install Extension', tx+40, 443);

  ctx.strokeStyle = COLORS.border; ctx.lineWidth = 1.5;
  roundRect(ctx, tx+236, 415, 170, 44, 10); ctx.stroke();
  ctx.font = '600 15px Inter'; ctx.fillStyle = COLORS.text;
  ctx.fillText('View on GitHub', tx+268, 443);

  // ── Right side: Feature cards ──
  const rx = 920, ry = 75;

  // Mock dashboard panel
  ctx.fillStyle = COLORS.bg2;
  roundRect(ctx, rx, ry, 420, 410, 14); ctx.fill();
  ctx.strokeStyle = COLORS.border; ctx.lineWidth = 1;
  roundRect(ctx, rx, ry, 420, 410, 14); ctx.stroke();

  // Panel header
  drawBugIcon(ctx, rx+28, ry+28, 0.3);
  ctx.font = '700 14px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('TraceBug AI', rx+48, ry+32);
  ctx.beginPath(); ctx.arc(rx+132, ry+28, 4, 0, Math.PI*2);
  ctx.fillStyle = COLORS.green; ctx.fill();

  // Session overview mini
  ctx.fillStyle = COLORS.bg3;
  roundRect(ctx, rx+16, ry+52, 388, 80, 8); ctx.fill();
  ctx.strokeStyle = COLORS.border; ctx.lineWidth = 0.5;
  roundRect(ctx, rx+16, ry+52, 388, 80, 8); ctx.stroke();

  ctx.font = '600 12px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Session Overview', rx+28, ry+72);
  ctx.fillStyle = COLORS.green; roundRect(ctx, rx+350, ry+60, 42, 18, 9); ctx.fill();
  ctx.font = '600 9px Inter'; ctx.fillStyle = '#001A10'; ctx.fillText('Healthy', rx+356, ry+72);

  const miniStats = [['4.8s','DURATION'],['12','EVENTS'],['2','PAGES'],['0','ERRORS']];
  miniStats.forEach(([val,lbl], i) => {
    const sx = rx+28 + i*96;
    ctx.font = '700 16px Inter'; ctx.fillStyle = '#fff';
    ctx.fillText(val, sx, ry+108);
    ctx.font = '500 8px Inter'; ctx.fillStyle = COLORS.muted;
    ctx.fillText(lbl, sx, ry+120);
  });

  // QA Tools
  ctx.font = '600 9px Inter'; ctx.fillStyle = COLORS.muted;
  ctx.fillText('QA TOOLS', rx+16, ry+152);
  const tools = [['Screenshot',COLORS.cyan],['Add Note',COLORS.yellow],['GitHub',COLORS.red],['Jira',COLORS.yellow],['PDF',COLORS.lavender],['Voice',COLORS.green]];
  tools.forEach(([t,color], i) => {
    const txx = rx+16 + i*65, ty = ry+160;
    ctx.fillStyle = color + '18';
    roundRect(ctx, txx, ty, 60, 22, 5); ctx.fill();
    ctx.font = '500 9px Inter'; ctx.fillStyle = color;
    ctx.fillText(t, txx+6, ty+15);
  });

  // Event timeline
  ctx.font = '600 11px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Event Timeline', rx+16, ry+210);

  const events = [
    ['Click','Clicked "Edit" button','#3B82F4'],
    ['Select','Status → "Inactive"','#A855F7'],
    ['Click','Clicked "Update"','#3B82F4'],
    ['API','PUT /api/vendors — 500','#FFD166'],
    ['Error','TypeError: Cannot read...','#FF4D6D'],
  ];
  events.forEach(([type,desc,color], i) => {
    const ey = ry+225 + i*34;

    // Timeline line
    ctx.beginPath(); ctx.arc(rx+28, ey+8, 4, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    if(i < events.length-1) {
      ctx.beginPath(); ctx.moveTo(rx+28, ey+12); ctx.lineTo(rx+28, ey+34);
      ctx.strokeStyle = COLORS.border; ctx.lineWidth = 1; ctx.stroke();
    }

    // Badge
    ctx.font = '600 9px Inter';
    const badgeW = ctx.measureText(type).width + 12;
    ctx.fillStyle = color + '20';
    roundRect(ctx, rx+42, ey, badgeW, 18, 3); ctx.fill();
    ctx.fillStyle = color;
    ctx.fillText(type, rx+48, ey+12);

    // Description
    ctx.font = '400 10px Inter'; ctx.fillStyle = COLORS.textDim;
    ctx.fillText(desc, rx+42+badgeW+8, ey+12);

    // Time
    ctx.font = '400 8px JetBrains Mono'; ctx.fillStyle = COLORS.muted;
    ctx.fillText('3:31:' + (22+i) + ' PM', rx+360, ey+12);
  });

  // Bottom accent line
  const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
  lineGrad.addColorStop(0, 'rgba(0,229,255,0)');
  lineGrad.addColorStop(0.2, 'rgba(0,229,255,0.5)');
  lineGrad.addColorStop(0.5, 'rgba(123,97,255,0.7)');
  lineGrad.addColorStop(0.8, 'rgba(0,229,255,0.5)');
  lineGrad.addColorStop(1, 'rgba(0,229,255,0)');
  ctx.fillStyle = lineGrad;
  ctx.fillRect(0, H-3, W, 3);

  // Bottom bar
  ctx.fillStyle = 'rgba(123,97,255,0.04)';
  ctx.fillRect(0, H-50, W, 50);
  ctx.font = '500 13px JetBrains Mono'; ctx.fillStyle = COLORS.muted;
  ctx.fillText('tracebug.netlify.app', 80, H-22);
  ctx.fillStyle = COLORS.primary + '60';
  ctx.fillText('·', 260, H-22);
  ctx.fillStyle = COLORS.muted;
  ctx.fillText('Debug faster. Ship better.', 280, H-22);

  // Works with frameworks — bottom right
  ctx.font = '500 11px Inter'; ctx.fillStyle = COLORS.muted;
  ctx.fillText('Works with:', 920, H-22);
  const fws = ['React','Next.js','Vue','Angular','Svelte','Any'];
  fws.forEach((fw, i) => {
    ctx.fillStyle = COLORS.textDim;
    ctx.fillText(fw, 1000 + i*68, H-22);
  });
})();


function downloadTile(id) {
  const canvas = canvases[id];
  if (!canvas) return;
  const a = document.createElement('a');
  const name = id === 'small' ? 'tracebug-promo-440x280.jpg' : 'tracebug-marquee-1400x560.jpg';
  a.download = name;
  a.href = canvas.toDataURL('image/jpeg', 0.95);
  a.click();
}
</script>
</body>
</html>
