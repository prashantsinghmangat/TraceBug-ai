<!DOCTYPE html>
<html>
<head>
  <title>Generate TraceBug Brand Icons</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0B0B0F; color: #E0E0EE; padding: 2rem; }
    h2 { margin-bottom: 0.5rem; }
    .sub { color: #6B6B80; font-size: 0.85rem; margin-bottom: 2rem; }
    .icons { display: flex; gap: 2rem; align-items: flex-end; flex-wrap: wrap; margin-bottom: 2rem; }
    .icon-box { text-align: center; }
    .icon-box p { font-size: 0.8rem; color: #7B61FF; margin-bottom: 8px; font-family: monospace; }
    canvas { border: 1px solid #1E1E2E; border-radius: 8px; }
    button { background: #7B61FF; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600; }
    button:hover { background: #6A50EE; }
  </style>
</head>
<body>
<h2>TraceBug Brand Icons</h2>
<p class="sub">Right-click each icon and "Save image as" to the icons/ folder, or click Download All</p>
<div class="icons">
  <div class="icon-box">
    <p>icon16.png</p>
    <canvas id="c16" width="16" height="16"></canvas>
  </div>
  <div class="icon-box">
    <p>icon48.png</p>
    <canvas id="c48" width="48" height="48"></canvas>
  </div>
  <div class="icon-box">
    <p>icon128.png</p>
    <canvas id="c128" width="128" height="128"></canvas>
  </div>
</div>
<button onclick="downloadAll()">Download All Icons</button>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const c = s / 2;

  // Clear
  ctx.clearRect(0, 0, s, s);

  // Background rounded rect
  const r = s * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();

  // Dark gradient background
  const bgGrad = ctx.createLinearGradient(0, 0, s, s);
  bgGrad.addColorStop(0, '#1A1530');
  bgGrad.addColorStop(1, '#0B0B0F');
  ctx.fillStyle = bgGrad;
  ctx.fill();

  // Border
  const borderGrad = ctx.createLinearGradient(0, 0, s, s);
  borderGrad.addColorStop(0, 'rgba(155,125,255,0.3)');
  borderGrad.addColorStop(1, 'rgba(0,229,255,0.3)');
  ctx.strokeStyle = borderGrad;
  ctx.lineWidth = Math.max(1, s * 0.01);
  ctx.stroke();

  // Scale factor
  const f = s / 80;

  // Hexagonal body
  const bodyGrad = ctx.createLinearGradient(0, 0, s, s);
  bodyGrad.addColorStop(0, '#9B7DFF');
  bodyGrad.addColorStop(1, '#00E5FF');

  ctx.beginPath();
  ctx.moveTo(40*f, 15*f); ctx.lineTo(57*f, 25*f); ctx.lineTo(57*f, 44*f);
  ctx.lineTo(40*f, 54*f); ctx.lineTo(23*f, 44*f); ctx.lineTo(23*f, 25*f);
  ctx.closePath();
  ctx.fillStyle = 'rgba(123,97,255,0.12)';
  ctx.fill();
  ctx.strokeStyle = bodyGrad;
  ctx.lineWidth = Math.max(1, 1.6 * f);
  ctx.stroke();

  // Scan line
  const scanGrad = ctx.createLinearGradient(15*f, 0, 65*f, 0);
  scanGrad.addColorStop(0, 'rgba(0,229,255,0)');
  scanGrad.addColorStop(0.3, 'rgba(0,229,255,0.9)');
  scanGrad.addColorStop(0.7, 'rgba(123,97,255,0.9)');
  scanGrad.addColorStop(1, 'rgba(123,97,255,0)');
  ctx.fillStyle = scanGrad;
  roundRect(ctx, 15*f, 33.5*f, 50*f, 2.2*f, 1.1*f);
  ctx.fill();

  // Antennae
  ctx.lineCap = 'round';

  // Left antenna
  ctx.beginPath(); ctx.moveTo(27*f, 24*f); ctx.lineTo(17*f, 14*f);
  ctx.strokeStyle = '#9B7DFF'; ctx.lineWidth = Math.max(1, 1.8*f); ctx.stroke();
  ctx.beginPath(); ctx.arc(17*f, 14*f, 2.8*f, 0, Math.PI*2);
  ctx.fillStyle = '#9B7DFF'; ctx.fill();
  ctx.beginPath(); ctx.arc(17*f, 14*f, 1.1*f, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff'; ctx.fill();

  // Right antenna
  ctx.beginPath(); ctx.moveTo(53*f, 24*f); ctx.lineTo(63*f, 14*f);
  ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = Math.max(1, 1.8*f); ctx.stroke();
  ctx.beginPath(); ctx.arc(63*f, 14*f, 2.8*f, 0, Math.PI*2);
  ctx.fillStyle = '#00E5FF'; ctx.fill();
  ctx.beginPath(); ctx.arc(63*f, 14*f, 1.1*f, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff'; ctx.fill();

  // Legs left
  const legW = Math.max(1, 1.4*f);
  ctx.globalAlpha = 0.8;
  drawLine(ctx, 23*f, 30*f, 13*f, 27*f, '#7B61FF', legW);
  drawLine(ctx, 23*f, 37*f, 11*f, 37*f, '#7B61FF', legW);
  drawLine(ctx, 23*f, 44*f, 13*f, 47*f, '#7B61FF', legW);

  // Legs right
  drawLine(ctx, 57*f, 30*f, 67*f, 27*f, '#00E5FF', legW);
  drawLine(ctx, 57*f, 37*f, 69*f, 37*f, '#00E5FF', legW);
  drawLine(ctx, 57*f, 44*f, 67*f, 47*f, '#00E5FF', legW);
  ctx.globalAlpha = 1;

  // Eyes
  ctx.globalAlpha = 0.9;
  ctx.beginPath(); ctx.arc(34*f, 28*f, 2*f, 0, Math.PI*2);
  ctx.fillStyle = '#00E5FF'; ctx.fill();
  ctx.beginPath(); ctx.arc(34*f, 28*f, 0.8*f, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff'; ctx.fill();

  ctx.beginPath(); ctx.arc(46*f, 28*f, 2*f, 0, Math.PI*2);
  ctx.fillStyle = '#9B7DFF'; ctx.fill();
  ctx.beginPath(); ctx.arc(46*f, 28*f, 0.8*f, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff'; ctx.fill();
  ctx.globalAlpha = 1;

  // Core
  ctx.beginPath(); ctx.arc(40*f, 34*f, 3.8*f, 0, Math.PI*2);
  const coreGrad = ctx.createLinearGradient(36*f, 30*f, 44*f, 38*f);
  coreGrad.addColorStop(0, '#9B7DFF'); coreGrad.addColorStop(1, '#00E5FF');
  ctx.fillStyle = coreGrad; ctx.fill();
  ctx.beginPath(); ctx.arc(40*f, 34*f, 1.6*f, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff'; ctx.fill();
}

function drawLine(ctx, x1, y1, x2, y2, color, width) {
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = color; ctx.lineWidth = width; ctx.stroke();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

drawIcon(document.getElementById('c16'));
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c128'));

function downloadAll() {
  ['c16','c48','c128'].forEach(id => {
    const canvas = document.getElementById(id);
    const a = document.createElement('a');
    a.download = 'icon' + canvas.width + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
