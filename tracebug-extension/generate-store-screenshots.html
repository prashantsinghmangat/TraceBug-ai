<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>TraceBug — Chrome Web Store Screenshots</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0B0B0F;color:#E8EAED;font-family:'Inter',sans-serif;padding:2rem}
  h1{font-size:1.5rem;margin-bottom:0.3rem}
  .sub{color:#6B6B80;font-size:0.85rem;font-family:'JetBrains Mono',monospace;margin-bottom:2rem}
  .screenshots{display:flex;flex-direction:column;gap:2rem}
  .shot-wrapper{position:relative}
  .shot-label{font-size:0.75rem;color:#7B61FF;font-family:'JetBrains Mono',monospace;margin-bottom:8px}
  canvas{border:1px solid #1E1E2E;border-radius:8px;display:block}
  .actions{margin-top:2rem;display:flex;gap:1rem}
  button{background:#7B61FF;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600;font-family:'Inter',sans-serif}
  button:hover{background:#6A50EE}
  button.secondary{background:#13131A;border:1px solid #1E1E2E}
  button.secondary:hover{border-color:#7B61FF}
</style>
</head>
<body>
<h1>Chrome Web Store Screenshots</h1>
<p class="sub">1280x800 JPEG — click "Download All" to save</p>

<div class="screenshots" id="screenshots"></div>

<div class="actions">
  <button onclick="downloadAll()">Download All (5 screenshots)</button>
</div>

<script>
const W = 1280, H = 800;
const COLORS = {
  bg: '#0B0B0F', bg2: '#13131A', bg3: '#16161E',
  primary: '#7B61FF', cyan: '#00E5FF', lavender: '#9B7DFF',
  red: '#FF4D6D', green: '#00FFA3', yellow: '#FFD166',
  border: '#1E1E2E', muted: '#6B6B80', text: '#E8EAED',
  textDim: '#8892A4'
};

function createCanvas(label) {
  const wrapper = document.createElement('div');
  wrapper.className = 'shot-wrapper';
  const lbl = document.createElement('div');
  lbl.className = 'shot-label';
  lbl.textContent = label;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  wrapper.appendChild(lbl);
  wrapper.appendChild(canvas);
  document.getElementById('screenshots').appendChild(wrapper);
  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawBugIcon(ctx, cx, cy, scale) {
  const f = scale;
  ctx.save();
  ctx.translate(cx - 40*f, cy - 34*f);

  // Body hex
  ctx.beginPath();
  ctx.moveTo(40*f,15*f); ctx.lineTo(57*f,25*f); ctx.lineTo(57*f,44*f);
  ctx.lineTo(40*f,54*f); ctx.lineTo(23*f,44*f); ctx.lineTo(23*f,25*f); ctx.closePath();
  ctx.fillStyle = 'rgba(123,97,255,0.12)'; ctx.fill();
  const bodyGrad = ctx.createLinearGradient(23*f,15*f,57*f,54*f);
  bodyGrad.addColorStop(0,'#9B7DFF'); bodyGrad.addColorStop(1,'#00E5FF');
  ctx.strokeStyle = bodyGrad; ctx.lineWidth = Math.max(1,1.6*f); ctx.stroke();

  // Scan line
  const scanGrad = ctx.createLinearGradient(15*f,0,65*f,0);
  scanGrad.addColorStop(0,'rgba(0,229,255,0)'); scanGrad.addColorStop(0.3,'rgba(0,229,255,0.9)');
  scanGrad.addColorStop(0.7,'rgba(123,97,255,0.9)'); scanGrad.addColorStop(1,'rgba(123,97,255,0)');
  ctx.fillStyle = scanGrad;
  roundRect(ctx,15*f,33.5*f,50*f,2.2*f,1.1*f); ctx.fill();

  ctx.lineCap = 'round';
  // Left antenna
  ctx.beginPath(); ctx.moveTo(27*f,24*f); ctx.lineTo(17*f,14*f);
  ctx.strokeStyle='#9B7DFF'; ctx.lineWidth=Math.max(1,1.8*f); ctx.stroke();
  ctx.beginPath(); ctx.arc(17*f,14*f,2.8*f,0,Math.PI*2); ctx.fillStyle='#9B7DFF'; ctx.fill();
  ctx.beginPath(); ctx.arc(17*f,14*f,1.1*f,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  // Right antenna
  ctx.beginPath(); ctx.moveTo(53*f,24*f); ctx.lineTo(63*f,14*f);
  ctx.strokeStyle='#00E5FF'; ctx.lineWidth=Math.max(1,1.8*f); ctx.stroke();
  ctx.beginPath(); ctx.arc(63*f,14*f,2.8*f,0,Math.PI*2); ctx.fillStyle='#00E5FF'; ctx.fill();
  ctx.beginPath(); ctx.arc(63*f,14*f,1.1*f,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();

  // Legs
  const lw = Math.max(1,1.4*f);
  ctx.globalAlpha=0.8;
  [[23,30,13,27],[23,37,11,37],[23,44,13,47]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1*f,y1*f);ctx.lineTo(x2*f,y2*f);ctx.strokeStyle='#7B61FF';ctx.lineWidth=lw;ctx.stroke();
  });
  [[57,30,67,27],[57,37,69,37],[57,44,67,47]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1*f,y1*f);ctx.lineTo(x2*f,y2*f);ctx.strokeStyle='#00E5FF';ctx.lineWidth=lw;ctx.stroke();
  });
  ctx.globalAlpha=1;

  // Eyes
  ctx.beginPath(); ctx.arc(34*f,28*f,2*f,0,Math.PI*2); ctx.fillStyle='#00E5FF'; ctx.fill();
  ctx.beginPath(); ctx.arc(46*f,28*f,2*f,0,Math.PI*2); ctx.fillStyle='#9B7DFF'; ctx.fill();
  // Core
  ctx.beginPath(); ctx.arc(40*f,34*f,3.8*f,0,Math.PI*2);
  const cg=ctx.createLinearGradient(36*f,30*f,44*f,38*f);cg.addColorStop(0,'#9B7DFF');cg.addColorStop(1,'#00E5FF');
  ctx.fillStyle=cg; ctx.fill();
  ctx.beginPath(); ctx.arc(40*f,34*f,1.6*f,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();

  ctx.restore();
}

function drawGradientText(ctx, text, x, y, size, weight) {
  ctx.font = `${weight || 700} ${size}px Inter`;
  ctx.fillStyle = '#E8EAED';
  ctx.fillText(text, x, y);
}

function drawTag(ctx, text, x, y, color) {
  ctx.font = '600 14px Inter';
  const w = ctx.measureText(text).width + 20;
  ctx.fillStyle = color + '18';
  roundRect(ctx, x, y-4, w, 26, 13); ctx.fill();
  ctx.strokeStyle = color + '40';
  ctx.lineWidth = 1;
  roundRect(ctx, x, y-4, w, 26, 13); ctx.stroke();
  ctx.fillStyle = color;
  ctx.fillText(text, x+10, y+14);
}

function drawCard(ctx, x, y, w, h) {
  ctx.fillStyle = COLORS.bg2;
  roundRect(ctx, x, y, w, h, 12); ctx.fill();
  ctx.strokeStyle = COLORS.border;
  ctx.lineWidth = 1;
  roundRect(ctx, x, y, w, h, 12); ctx.stroke();
}

// ─── SCREENSHOT 1: Hero ───
(function() {
  const c = createCanvas('screenshot-1-hero.jpg');
  const ctx = c.getContext('2d');

  // Background
  ctx.fillStyle = COLORS.bg; ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(123,97,255,0.04)'; ctx.lineWidth = 1;
  for(let i=0;i<W;i+=60){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
  for(let i=0;i<H;i+=60){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}

  // Glow orbs
  const g1 = ctx.createRadialGradient(300,400,0,300,400,300);
  g1.addColorStop(0,'rgba(123,97,255,0.08)'); g1.addColorStop(1,'rgba(123,97,255,0)');
  ctx.fillStyle = g1; ctx.fillRect(0,0,W,H);
  const g2 = ctx.createRadialGradient(900,300,0,900,300,250);
  g2.addColorStop(0,'rgba(0,229,255,0.05)'); g2.addColorStop(1,'rgba(0,229,255,0)');
  ctx.fillStyle = g2; ctx.fillRect(0,0,W,H);

  // Bug icon
  drawBugIcon(ctx, 200, 350, 2.5);

  // Badge
  drawTag(ctx, 'Zero Backend  •  Browser Only  •  Free', 440, 200, COLORS.green);

  // Headline
  ctx.font = '800 52px Inter'; ctx.fillStyle = '#FFFFFF';
  ctx.fillText('Debug Bugs in Seconds', 440, 300);
  ctx.fillText('— Not Hours', 440, 360);

  // Subline
  ctx.font = '400 18px Inter'; ctx.fillStyle = COLORS.textDim;
  ctx.fillText('TraceBug records user actions, console errors, network calls,', 440, 410);
  ctx.fillText('and screenshots to generate developer-ready bug reports.', 440, 435);

  // CTA buttons
  ctx.fillStyle = COLORS.primary;
  roundRect(ctx, 440, 480, 240, 48, 10); ctx.fill();
  ctx.font = '600 16px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Install Chrome Extension', 468, 510);

  ctx.strokeStyle = COLORS.border; ctx.lineWidth = 1.5;
  roundRect(ctx, 700, 480, 180, 48, 10); ctx.stroke();
  ctx.fillStyle = COLORS.text;
  ctx.fillText('View on GitHub', 732, 510);

  // Bottom features strip
  const features = ['Session Recording', 'Console Errors', 'Network Logs', 'Screenshots', 'Voice Notes', 'GitHub & Jira'];
  const featureColors = [COLORS.primary, COLORS.red, COLORS.yellow, COLORS.cyan, COLORS.lavender, COLORS.green];
  features.forEach((f, i) => {
    const fx = 80 + i * 195;
    ctx.fillStyle = featureColors[i] + '15';
    roundRect(ctx, fx, 700, 180, 36, 8); ctx.fill();
    ctx.strokeStyle = featureColors[i] + '30'; ctx.lineWidth = 1;
    roundRect(ctx, fx, 700, 180, 36, 8); ctx.stroke();
    ctx.font = '500 13px Inter'; ctx.fillStyle = featureColors[i];
    ctx.fillText(f, fx + 16, 723);
  });

  // TraceBug wordmark top-left
  ctx.font = '700 20px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('TraceBug', 60, 60);
  ctx.font = '500 12px JetBrains Mono'; ctx.fillStyle = COLORS.muted;
  ctx.fillText('Automatic Bug Reporting for Developers', 160, 60);
})();


// ─── SCREENSHOT 2: Extension Popup + Dashboard ───
(function() {
  const c = createCanvas('screenshot-2-extension.jpg');
  const ctx = c.getContext('2d');
  ctx.fillStyle = COLORS.bg; ctx.fillRect(0,0,W,H);

  // Title
  ctx.font = '700 28px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Chrome Extension — Works on Any Website', 80, 80);
  ctx.font = '400 16px Inter'; ctx.fillStyle = COLORS.textDim;
  ctx.fillText('Enable TraceBug on any site with one click. No code changes needed.', 80, 115);

  // Popup mockup (left side)
  const px = 100, py = 170, pw = 340, ph = 520;
  drawCard(ctx, px, py, pw, ph);

  // Popup header
  drawBugIcon(ctx, px+30, py+35, 0.35);
  ctx.font = '700 17px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('TraceBug', px+55, py+40);
  ctx.fillStyle = COLORS.primary + '30';
  roundRect(ctx, px+pw-80, py+22, 60, 22, 11); ctx.fill();
  ctx.font = '500 10px JetBrains Mono'; ctx.fillStyle = COLORS.primary;
  ctx.fillText('v1.1.1', px+pw-70, py+37);

  // Divider
  ctx.strokeStyle = COLORS.border; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px+16, py+60); ctx.lineTo(px+pw-16, py+60); ctx.stroke();

  // Site info card
  drawCard(ctx, px+16, py+75, pw-32, 52);
  ctx.font = '600 14px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('example.com', px+30, py+100);
  ctx.font = '400 11px Inter'; ctx.fillStyle = COLORS.muted;
  ctx.fillText('https://example.com/dashboard', px+30, py+118);

  // Toggle
  drawCard(ctx, px+16, py+140, pw-32, 44);
  ctx.beginPath(); ctx.arc(px+36, py+162, 4, 0, Math.PI*2);
  ctx.fillStyle = COLORS.green; ctx.fill();
  ctx.font = '500 13px Inter'; ctx.fillStyle = '#cbd5e1';
  ctx.fillText('TraceBug Active', px+50, py+167);
  // Toggle switch
  ctx.fillStyle = COLORS.green;
  roundRect(ctx, px+pw-68, py+151, 42, 22, 11); ctx.fill();
  ctx.beginPath(); ctx.arc(px+pw-37, py+162, 8, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();

  // Recording bar
  ctx.fillStyle = COLORS.green + '12';
  roundRect(ctx, px+16, py+198, pw-32, 34, 8); ctx.fill();
  ctx.strokeStyle = COLORS.green + '30'; ctx.lineWidth = 1;
  roundRect(ctx, px+16, py+198, pw-32, 34, 8); ctx.stroke();
  ctx.beginPath(); ctx.arc(px+32, py+215, 4, 0, Math.PI*2);
  ctx.fillStyle = COLORS.green; ctx.fill();
  ctx.font = '500 12px Inter'; ctx.fillStyle = COLORS.green;
  ctx.fillText('Recording events on this page...', px+44, py+219);

  // Action buttons
  const btns = [['Screenshot','#7B61FF'],['PDF Report','#7B61FF'],['GitHub Issue','#9B7DFF'],['Jira Ticket','#0C66E4']];
  btns.forEach(([label, color], i) => {
    const bx = px+16+(i%2)*(pw/2-12), by = py+248+Math.floor(i/2)*48;
    drawCard(ctx, bx, by, pw/2-20, 40);
    ctx.font = '500 12px Inter'; ctx.fillStyle = '#cbd5e1';
    ctx.fillText(label, bx+36, by+25);
  });

  // Active sites
  ctx.font = '600 11px Inter'; ctx.fillStyle = COLORS.muted; ctx.letterSpacing = '0.5px';
  ctx.fillText('ACTIVE SITES', px+20, py+385);
  ctx.fillStyle = COLORS.primary + '30';
  roundRect(ctx, px+pw-48, py+374, 28, 18, 9); ctx.fill();
  ctx.font = '500 10px Inter'; ctx.fillStyle = COLORS.primary;
  ctx.fillText('1', px+pw-38, py+387);

  drawCard(ctx, px+16, py+398, pw-32, 40);
  ctx.beginPath(); ctx.arc(px+32, py+418, 3, 0, Math.PI*2);
  ctx.fillStyle = COLORS.green; ctx.fill();
  ctx.font = '400 12px Inter'; ctx.fillStyle = COLORS.textDim;
  ctx.fillText('example.com', px+44, py+422);

  // Footer
  ctx.font = '400 11px Inter'; ctx.fillStyle = COLORS.muted;
  ctx.fillText('Website  ·  npm  ·  GitHub', px+100, py+ph-12);

  // Right side: Dashboard panel mockup
  const dx = 560, dy = 170, dw = 620, dh = 520;
  drawCard(ctx, dx, dy, dw, dh);

  // Dashboard header
  drawBugIcon(ctx, dx+30, dy+30, 0.3);
  ctx.font = '700 16px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('TraceBug AI', dx+50, dy+35);
  ctx.beginPath(); ctx.arc(dx+148, dy+30, 4, 0, Math.PI*2);
  ctx.fillStyle = COLORS.green; ctx.fill();

  // Session overview card
  drawCard(ctx, dx+20, dy+60, dw-40, 120);
  ctx.font = '700 15px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Session Overview', dx+36, dy+85);
  ctx.fillStyle = COLORS.green; roundRect(ctx, dx+dw-100, dy+72, 60, 22, 11); ctx.fill();
  ctx.font = '600 11px Inter'; ctx.fillStyle = '#001A10'; ctx.fillText('Healthy', dx+dw-90, dy+87);

  // Stats
  const stats = [['DURATION','4.8s'],['EVENTS','12'],['PAGES','2'],['API CALLS','3 (0 failed)']];
  stats.forEach(([label,val], i) => {
    const sx = dx+36 + i*140, sy = dy+105;
    ctx.font = '500 10px Inter'; ctx.fillStyle = COLORS.muted; ctx.fillText(label, sx, sy);
    ctx.font = '700 18px Inter'; ctx.fillStyle = '#fff'; ctx.fillText(val, sx, sy+22);
  });

  // QA Tools
  ctx.font = '600 11px Inter'; ctx.fillStyle = COLORS.muted;
  ctx.fillText('QA TOOLS', dx+20, dy+210);
  const tools = [['Screenshot',COLORS.cyan],['Add Note',COLORS.yellow],['GitHub Issue',COLORS.red],['Jira Ticket',COLORS.yellow],['PDF Report',COLORS.lavender],['Voice Note',COLORS.green]];
  tools.forEach(([t,color], i) => {
    const tx = dx+20 + i*98, ty = dy+220;
    ctx.fillStyle = color + '18';
    roundRect(ctx, tx, ty, 92, 28, 6); ctx.fill();
    ctx.font = '500 11px Inter'; ctx.fillStyle = color;
    ctx.fillText(t, tx+8, ty+18);
  });

  // Timeline
  ctx.font = '700 14px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Event Timeline', dx+20, dy+285);

  const events = [
    ['Click','Clicked "Install Chrome Extension"','#3B82F4','3:31:22 PM'],
    ['Click','Clicked "View on GitHub"','#3B82F4','3:31:24 PM'],
    ['Route','Navigated to /docs','#00E5FF','3:31:25 PM'],
    ['API','GET /api/docs — 200 OK (120ms)','#FFD166','3:31:25 PM'],
    ['Error','TypeError: Cannot read property...','#FF4D6D','3:31:28 PM'],
  ];
  events.forEach(([type,desc,color,time], i) => {
    const ey = dy+305 + i*40;
    // Timeline dot and line
    ctx.beginPath(); ctx.arc(dx+36, ey+10, 5, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    if(i < events.length-1) {
      ctx.beginPath(); ctx.moveTo(dx+36, ey+15); ctx.lineTo(dx+36, ey+40);
      ctx.strokeStyle = COLORS.border; ctx.lineWidth = 1; ctx.stroke();
    }
    // Badge
    ctx.fillStyle = color + '20';
    roundRect(ctx, dx+52, ey, ctx.measureText(type).width+30, 22, 4); ctx.fill();
    ctx.font = '600 11px Inter'; ctx.fillStyle = color;
    ctx.fillText(type, dx+60, ey+15);
    // Time
    ctx.font = '400 10px JetBrains Mono'; ctx.fillStyle = COLORS.muted;
    ctx.fillText(time, dx+dw-110, ey+15);
    // Description
    ctx.font = '400 12px Inter'; ctx.fillStyle = COLORS.textDim;
    ctx.fillText(desc, dx+52 + ctx.measureText(type).width+40, ey+15);
  });
})();


// ─── SCREENSHOT 3: Bug Report Output ───
(function() {
  const c = createCanvas('screenshot-3-bug-report.jpg');
  const ctx = c.getContext('2d');
  ctx.fillStyle = COLORS.bg; ctx.fillRect(0,0,W,H);

  ctx.font = '700 28px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Developer-Ready Bug Reports in One Click', 80, 80);
  ctx.font = '400 16px Inter'; ctx.fillStyle = COLORS.textDim;
  ctx.fillText('Auto-generated with steps, errors, network logs, screenshots, and environment info.', 80, 115);

  // Bug report card
  const rx = 80, ry = 155, rw = 1120, rh = 590;
  drawCard(ctx, rx, ry, rw, rh);

  // Title
  ctx.font = '700 22px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Vendor Update Fails — TypeError', rx+30, ry+40);
  ctx.fillStyle = COLORS.red + '20';
  roundRect(ctx, rx+rw-100, ry+20, 72, 26, 6); ctx.fill();
  ctx.font = '600 12px Inter'; ctx.fillStyle = COLORS.red;
  ctx.fillText('Critical', rx+rw-86, ry+38);

  // Divider
  ctx.strokeStyle = COLORS.border; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(rx+30, ry+60); ctx.lineTo(rx+rw-30, ry+60); ctx.stroke();

  // Left column: Steps + Environment
  // Steps to Reproduce
  ctx.font = '700 15px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Steps to Reproduce', rx+30, ry+90);

  const steps = [
    'Navigate to /vendor',
    'Click "Edit" button',
    'Select Status → "Inactive"',
    'Click "Update" button',
    'TypeError is thrown'
  ];
  steps.forEach((s, i) => {
    const sy = ry+115 + i*28;
    ctx.font = '600 13px JetBrains Mono'; ctx.fillStyle = COLORS.primary;
    ctx.fillText(`${i+1}.`, rx+36, sy);
    ctx.font = '400 13px Inter'; ctx.fillStyle = COLORS.textDim;
    ctx.fillText(s, rx+60, sy);
  });

  // Environment
  ctx.font = '700 15px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Environment', rx+30, ry+285);

  const envData = [['Browser','Chrome 146.0'],['OS','Windows 10/11'],['Viewport','1600x732'],['Device','Desktop'],['Connection','4g'],['URL','/vendor']];
  envData.forEach(([k,v], i) => {
    const col = i % 3, row = Math.floor(i/3);
    const ex = rx+30 + col*180, ey = ry+305 + row*50;
    drawCard(ctx, ex, ey, 168, 42);
    ctx.font = '500 10px Inter'; ctx.fillStyle = COLORS.muted; ctx.fillText(k.toUpperCase(), ex+12, ey+16);
    ctx.font = '600 13px Inter'; ctx.fillStyle = '#fff'; ctx.fillText(v, ex+12, ey+34);
  });

  // Right column: Console Error + Network
  const cx2 = rx + 570;

  // Console Error
  ctx.font = '700 15px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Console Errors', cx2, ry+90);

  drawCard(ctx, cx2, ry+105, rw-600, 130);
  ctx.font = '600 12px JetBrains Mono'; ctx.fillStyle = COLORS.red;
  ctx.fillText('TypeError: Cannot read properties', cx2+16, ry+130);
  ctx.fillText('of undefined (reading \'status\')', cx2+16, ry+150);
  ctx.font = '400 11px JetBrains Mono'; ctx.fillStyle = COLORS.muted;
  ctx.fillText('at VendorPage (/vendor/page.tsx:42:18)', cx2+16, ry+175);
  ctx.fillText('at updateVendor (/vendor/page.tsx:38:5)', cx2+16, ry+195);
  ctx.fillText('at onClick (react-dom.js:1204:14)', cx2+16, ry+215);

  // Network Logs
  ctx.font = '700 15px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Network Log', cx2, ry+270);

  drawCard(ctx, cx2, ry+285, rw-600, 120);
  // Header
  ctx.font = '600 10px Inter'; ctx.fillStyle = COLORS.muted;
  ['METHOD','URL','STATUS','TIME'].forEach((h,i) => {
    ctx.fillText(h, cx2+16+i*130, ry+305);
  });
  ctx.strokeStyle = COLORS.border;
  ctx.beginPath(); ctx.moveTo(cx2+16,ry+312); ctx.lineTo(cx2+rw-616,ry+312); ctx.stroke();

  const reqs = [
    ['GET','/api/vendors','200 OK','85ms',COLORS.green],
    ['PUT','/api/vendors/12','500 Error','230ms',COLORS.red],
    ['GET','/api/config','200 OK','42ms',COLORS.green]
  ];
  reqs.forEach(([method,url,status,time,color], i) => {
    const ny = ry+330 + i*24;
    ctx.font = '600 11px JetBrains Mono';
    ctx.fillStyle = COLORS.cyan; ctx.fillText(method, cx2+16, ny);
    ctx.fillStyle = COLORS.textDim; ctx.fillText(url, cx2+146, ny);
    ctx.fillStyle = color; ctx.fillText(status, cx2+276, ny);
    ctx.fillStyle = COLORS.muted; ctx.fillText(time, cx2+406, ny);
  });

  // Session timeline mini
  ctx.font = '700 15px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Session Timeline', cx2, ry+440);

  const timeline = [
    ['Navigate','/vendor','#00E5FF'],
    ['Click','Edit button','#3B82F4'],
    ['Select','Status → Inactive','#A855F7'],
    ['Click','Update button','#3B82F4'],
    ['Error','TypeError thrown','#FF4D6D'],
  ];
  timeline.forEach(([type,desc,color], i) => {
    const tx = cx2 + i*105, ty = ry+460;
    ctx.beginPath(); ctx.arc(tx+10, ty+10, 6, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    if(i < timeline.length-1) {
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(tx+16, ty+10); ctx.lineTo(tx+100, ty+10);
      ctx.strokeStyle = COLORS.border; ctx.lineWidth = 1; ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.font = '600 10px Inter'; ctx.fillStyle = color; ctx.fillText(type, tx, ty+30);
    ctx.font = '400 10px Inter'; ctx.fillStyle = COLORS.muted; ctx.fillText(desc, tx, ty+44);
  });
})();


// ─── SCREENSHOT 4: Features Overview ───
(function() {
  const c = createCanvas('screenshot-4-features.jpg');
  const ctx = c.getContext('2d');
  ctx.fillStyle = COLORS.bg; ctx.fillRect(0,0,W,H);

  ctx.font = '700 28px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Everything You Need for Faster Debugging', 80, 80);
  ctx.font = '400 16px Inter'; ctx.fillStyle = COLORS.textDim;
  ctx.fillText('Zero backend. All data stays in your browser. Works with any frontend framework.', 80, 115);

  const features = [
    ['Automatic Bug Reports','Converts user sessions into structured bug reports with titles, steps, and environment data.', COLORS.primary],
    ['Session Recording','Captures every click, input, select, form submit, and navigation event silently.', '#3B82F4'],
    ['Console & Network Monitoring','Intercepts console.error(), unhandled rejections, and all fetch/XHR requests.', COLORS.yellow],
    ['Screenshot Capture','Full-page capture with html2canvas. Annotate with highlights, arrows, and text.', COLORS.cyan],
    ['Voice Bug Description','Speak to describe bugs using Web Speech API. Free, no API keys needed.', COLORS.lavender],
    ['GitHub & Jira Integration','One-click export to GitHub Issues (markdown) or Jira tickets. Auto-downloads screenshots.', COLORS.green],
    ['Privacy Built-In','Passwords, credit cards, SSNs, and tokens auto-redacted. SDK never records its own UI.', COLORS.red],
    ['Framework Noise Filtering','Auto-filters Next.js, Webpack, Vite HMR internal requests from API tracking.', '#FF8C42'],
  ];

  features.forEach((f, i) => {
    const col = i % 2, row = Math.floor(i/2);
    const fx = 80 + col * 580, fy = 155 + row * 152;
    drawCard(ctx, fx, fy, 560, 138);

    // Color accent bar
    ctx.fillStyle = f[2];
    roundRect(ctx, fx, fy, 4, 138, 2); ctx.fill();

    ctx.font = '700 16px Inter'; ctx.fillStyle = '#fff';
    ctx.fillText(f[0], fx+24, fy+30);

    // Wrap description
    ctx.font = '400 13px Inter'; ctx.fillStyle = COLORS.textDim;
    const words = f[1].split(' ');
    let line = '', ly = fy + 55;
    words.forEach(w => {
      const test = line + w + ' ';
      if (ctx.measureText(test).width > 510) {
        ctx.fillText(line, fx+24, ly);
        line = w + ' '; ly += 20;
      } else { line = test; }
    });
    ctx.fillText(line, fx+24, ly);

    // Feature tag
    ctx.fillStyle = f[2] + '18';
    roundRect(ctx, fx+24, fy+100, 8, 8, 4); ctx.fill();
  });

  // Bottom bar - framework logos
  ctx.font = '500 13px Inter'; ctx.fillStyle = COLORS.muted;
  ctx.fillText('Works with:', 80, 770);
  const frameworks = ['React', 'Next.js', 'Vue', 'Angular', 'Svelte', 'Vite', 'Nuxt', 'Remix', 'Astro', 'Plain HTML'];
  frameworks.forEach((fw, i) => {
    const fwx = 180 + i * 108;
    ctx.fillStyle = COLORS.bg2;
    roundRect(ctx, fwx, 755, 98, 28, 6); ctx.fill();
    ctx.strokeStyle = COLORS.border; ctx.lineWidth = 1;
    roundRect(ctx, fwx, 755, 98, 28, 6); ctx.stroke();
    ctx.font = '500 12px Inter'; ctx.fillStyle = COLORS.textDim;
    ctx.fillText(fw, fwx+12, 774);
  });
})();


// ─── SCREENSHOT 5: Before/After Comparison ───
(function() {
  const c = createCanvas('screenshot-5-comparison.jpg');
  const ctx = c.getContext('2d');
  ctx.fillStyle = COLORS.bg; ctx.fillRect(0,0,W,H);

  ctx.font = '700 28px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('Manual Bug Reporting vs TraceBug', 80, 80);
  ctx.font = '400 16px Inter'; ctx.fillStyle = COLORS.textDim;
  ctx.fillText('Stop wasting hours on vague bug reports. Get complete debugging context instantly.', 80, 115);

  // Before column
  const bx = 80, by = 160, bw = 540, bh = 580;
  ctx.fillStyle = COLORS.red + '06';
  roundRect(ctx, bx, by, bw, bh, 16); ctx.fill();
  ctx.strokeStyle = COLORS.red + '20'; ctx.lineWidth = 1;
  roundRect(ctx, bx, by, bw, bh, 16); ctx.stroke();

  ctx.fillStyle = COLORS.red + '15';
  roundRect(ctx, bx+20, by+20, 180, 32, 8); ctx.fill();
  ctx.font = '700 14px Inter'; ctx.fillStyle = COLORS.red;
  ctx.fillText('Without TraceBug', bx+36, by+42);

  ctx.font = '700 20px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('30–60 minutes per bug', bx+30, by+95);

  const painPoints = [
    ['Steps to reproduce', 'Written manually, often incomplete or wrong'],
    ['Console errors', 'Developer has to ask: "What did the console say?"'],
    ['Network logs', 'Usually missing entirely'],
    ['Screenshots', 'Manually taken, often just the visible area'],
    ['Environment info', '"I think it was Chrome... maybe Firefox?"'],
    ['Reproduction', '"It worked on my machine" — hours of back-and-forth'],
  ];
  painPoints.forEach(([title, desc], i) => {
    const py = by + 130 + i * 72;
    // X icon
    ctx.beginPath();
    ctx.moveTo(bx+36, py-4); ctx.lineTo(bx+44, py+4);
    ctx.moveTo(bx+44, py-4); ctx.lineTo(bx+36, py+4);
    ctx.strokeStyle = COLORS.red; ctx.lineWidth = 2; ctx.stroke();

    ctx.font = '600 14px Inter'; ctx.fillStyle = '#fff';
    ctx.fillText(title, bx+60, py+2);
    ctx.font = '400 12px Inter'; ctx.fillStyle = COLORS.textDim;
    ctx.fillText(desc, bx+60, py+22);
  });

  // After column
  const ax = 660, ay = 160, aw = 540, ah = 580;
  ctx.fillStyle = COLORS.green + '06';
  roundRect(ctx, ax, ay, aw, ah, 16); ctx.fill();
  ctx.strokeStyle = COLORS.green + '20'; ctx.lineWidth = 1;
  roundRect(ctx, ax, ay, aw, ah, 16); ctx.stroke();

  ctx.fillStyle = COLORS.green + '15';
  roundRect(ctx, ax+20, ay+20, 160, 32, 8); ctx.fill();
  ctx.font = '700 14px Inter'; ctx.fillStyle = COLORS.green;
  ctx.fillText('With TraceBug', ax+36, ay+42);

  ctx.font = '700 20px Inter'; ctx.fillStyle = '#fff';
  ctx.fillText('< 1 minute per bug', ax+30, ay+95);

  const solutions = [
    ['Steps to reproduce', 'Auto-generated from recorded user actions'],
    ['Console errors', 'Auto-captured with full stack traces'],
    ['Network logs', 'Every fetch/XHR logged with status & timing'],
    ['Screenshots', 'One-click capture with annotation tools'],
    ['Environment info', 'Browser, OS, viewport, device auto-detected'],
    ['Reproduction', 'Complete session timeline — reproduce instantly'],
  ];
  solutions.forEach(([title, desc], i) => {
    const py = ay + 130 + i * 72;
    // Check icon
    ctx.beginPath();
    ctx.moveTo(ax+32, py); ctx.lineTo(ax+38, py+6); ctx.lineTo(ax+48, py-4);
    ctx.strokeStyle = COLORS.green; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();

    ctx.font = '600 14px Inter'; ctx.fillStyle = '#fff';
    ctx.fillText(title, ax+60, py+2);
    ctx.font = '400 12px Inter'; ctx.fillStyle = COLORS.textDim;
    ctx.fillText(desc, ax+60, py+22);
  });
})();


function downloadAll() {
  document.querySelectorAll('canvas').forEach((canvas, i) => {
    const a = document.createElement('a');
    a.download = `tracebug-screenshot-${i+1}.jpg`;
    a.href = canvas.toDataURL('image/jpeg', 0.95);
    a.click();
  });
}
