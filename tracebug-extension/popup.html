<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>TraceBug</title>
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="#ef4444" stroke-width="2"/>
            <circle cx="12" cy="12" r="3.5" fill="#ef4444"/>
            <line x1="12" y1="1" x2="12" y2="6" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="18" x2="12" y2="23" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
            <line x1="1" y1="12" x2="6" y2="12" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
            <line x1="18" y1="12" x2="23" y2="12" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="logo-text">TraceBug</span>
      </div>
      <span class="version">v1.1.0</span>
    </div>

    <!-- Unavailable state (chrome:// pages) -->
    <div class="unavailable" id="unavailable" style="display:none;">
      <div class="unavailable-icon">🚫</div>
      <div class="unavailable-text">Cannot run on this page</div>
      <div class="unavailable-sub">TraceBug works on websites only</div>
    </div>

    <!-- Main content -->
    <div id="mainContent">
      <!-- Site Info -->
      <div class="site-info">
        <div class="site-hostname" id="hostname">—</div>
        <div class="site-url" id="fullUrl">Loading...</div>
      </div>

      <!-- Toggle -->
      <div class="toggle-section">
        <label class="toggle-label" id="toggleLabel">
          <div class="toggle-left">
            <div class="status-dot" id="statusDot"></div>
            <span class="toggle-text" id="toggleText">Enable TraceBug</span>
          </div>
          <div class="toggle-switch">
            <input type="checkbox" id="siteToggle">
            <span class="toggle-slider"></span>
          </div>
        </label>
      </div>

      <!-- Recording indicator -->
      <div class="recording-bar" id="recordingBar" style="display:none;">
        <div class="recording-pulse"></div>
        <span>Recording events on this page...</span>
      </div>

      <!-- Quick Actions (shown when enabled) -->
      <div class="actions" id="actions" style="display:none;">
        <button class="action-btn" id="btnScreenshot" title="Capture visible page">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="5" width="18" height="14" rx="2"/>
            <circle cx="12" cy="12" r="3"/>
            <path d="M7 5V3h2M15 5V3h2"/>
          </svg>
          <span>Screenshot</span>
        </button>
        <button class="action-btn" id="btnReport" title="Download PDF report">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <span>PDF Report</span>
        </button>
        <button class="action-btn github" id="btnGithub" title="Copy GitHub issue markdown">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          <span>GitHub Issue</span>
        </button>
        <button class="action-btn jira" id="btnJira" title="Copy Jira ticket">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.53 2c0 2.4 1.97 4.35 4.35 4.35h1.78v1.7c0 2.4 1.94 4.34 4.34 4.35V2.84a.84.84 0 00-.84-.84H11.53zM6.77 6.8a4.36 4.36 0 004.34 4.34h1.78v1.72a4.36 4.36 0 004.34 4.34V7.63a.84.84 0 00-.83-.83H6.77zM2 11.6a4.35 4.35 0 004.34 4.34h1.78v1.72c0 2.4 1.94 4.34 4.34 4.34v-9.56a.84.84 0 00-.84-.84H2z"/>
          </svg>
          <span>Jira Ticket</span>
        </button>
      </div>

      <!-- Toast area for feedback -->
      <div class="toast-area" id="toastArea" style="display:none;">
        <div class="toast-content" id="toastContent"></div>
      </div>

      <!-- Enabled Sites List -->
      <div class="sites-section" id="sitesSection">
        <div class="sites-header">
          <span>Active Sites</span>
          <span class="sites-count" id="sitesCount">0</span>
        </div>
        <div class="sites-list" id="sitesList">
          <div class="no-sites">No sites enabled yet</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="https://www.npmjs.com/package/tracebug-sdk" target="_blank">npm</a>
      <span class="sep">·</span>
      <a href="https://github.com/prashantsinghmangat/TraceBug-ai" target="_blank">GitHub</a>
      <span class="sep">·</span>
      <span>by Prashant Singh</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
