<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>TraceBug</title>
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <header class="hd">
      <div class="hd-logo">
        <svg width="22" height="22" viewBox="0 0 96 96" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="p-grad" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#7C5CFF"/>
              <stop offset="100%" stop-color="#22D3EE"/>
            </linearGradient>
          </defs>
          <rect x="4" y="4" width="88" height="88" rx="24" fill="#0B0B0F"/>
          <path d="M30 33 L47 48 L30 63" fill="none" stroke="#EAECF3" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="52" y="41" width="14" height="14" rx="4" fill="url(#p-grad)"/>
        </svg>
        <span class="hd-name">TraceBug</span>
      </div>
      <button id="themeToggle" class="hd-theme" title="Toggle theme" aria-label="Toggle theme"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg></button>
    </header>

    <!-- Unavailable state (chrome:// pages) -->
    <div class="unavailable" id="unavailable" style="display:none;">
      <div class="unavailable-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/></svg></div>
      <div class="unavailable-text">Can't run on this page</div>
      <div class="unavailable-sub">TraceBug works on any website. Open a regular tab to get started.</div>
    </div>

    <!-- Main content -->
    <main id="mainContent" class="main">

      <!-- PHASE2-CLOUD: account / cloud-sharing block disabled for Phase 1 offline release
      <div class="account" id="account">
        <div class="account-loading" id="accountLoading">
          <span class="account-spinner"></span>
          <span class="account-label">Checking sign-in…</span>
        </div>
        <div class="account-out" id="accountOut" style="display:none;">
          <div class="account-row">
            <span class="account-icon">☁️</span>
            <div class="account-body">
              <div class="account-title">Cloud sharing</div>
              <div class="account-sub">Sign in to share bug reports as a link</div>
            </div>
            <button class="account-cta" id="btnSignIn">Sign in</button>
          </div>
        </div>
        <div class="account-in" id="accountIn" style="display:none;">
          <div class="account-row">
            <div class="account-avatar" id="accountAvatar">P</div>
            <div class="account-body">
              <div class="account-title" id="accountEmail">…</div>
              <div class="account-sub">
                <span id="accountQuotaVideo">🎥 0/5</span>
                <span class="account-sep">·</span>
                <span id="accountQuotaScreen">📸 0/10</span>
              </div>
            </div>
            <button class="account-cta-ghost" id="btnSignOut" title="Sign out">⎋</button>
          </div>
          <a class="account-link" id="linkDashboard" href="#" target="_blank" rel="noopener">Open dashboard →</a>
        </div>
      </div>
      PHASE2-CLOUD -->

      <!-- Site label -->
      <div class="site-label">
        <span class="site-host" id="hostname">—</span>
        <span class="site-path" id="sitePath"></span>
      </div>

      <!-- Hero CTA — starts a tab-capture recording. Reproduce, then stop in the
           on-page HUD; modal opens with the full replay + auto-collected data. -->
      <button class="cta-primary" id="btnCaptureBug">
        <span class="cta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg></span>
        <span class="cta-body">
          <span class="cta-title">Capture Bug</span>
          <span class="cta-sub">Records the tab · stop when done</span>
        </span>
        <svg class="cta-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 6 15 12 9 18"/></svg>
      </button>

      <!-- Microphone toggle. Default off so no mic permission prompt fires.
           Turn on to narrate the recording — adds a mic permission prompt
           the first time recording starts. State persists per user. -->
      <button class="mic-opt" id="micOpt" type="button" aria-pressed="false" title="Toggle microphone for the recording">
        <span class="mic-opt-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></span>
        <span class="mic-opt-text">Microphone</span>
        <span class="mic-opt-pill" id="micOptState">Off</span>
      </button>

      <!-- Secondary row -->
      <div class="cta-row">
        <button class="cta-secondary" id="btnScreenshot">
          <span class="cta2-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg></span>
          <span class="cta2-label">Screenshot only</span>
        </button>
        <button class="cta-secondary" id="btnViewTickets">
          <span class="cta2-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg></span>
          <span class="cta2-label">View tickets</span>
        </button>
      </div>

      <!-- Toast slot -->
      <div class="toast" id="toast" style="display:none;"></div>

      <!-- Hint (purely informational — no pre-arm step needed) -->
      <div class="hint" id="hint">
        <span class="hint-dot" id="hintDot"></span>
        <span class="hint-text" id="hintText">Nothing is tracked until you pick an action above.</span>
      </div>

    </main>

    <!-- Footer -->
    <footer class="ft">
      <a href="https://tracebug.netlify.app" target="_blank" rel="noopener">Site</a>
      <span class="ft-sep">·</span>
      <a href="https://www.npmjs.com/package/tracebug-sdk" target="_blank" rel="noopener">npm</a>
      <span class="ft-sep">·</span>
      <a href="https://github.com/prashantsinghmangat/TraceBug-ai" target="_blank" rel="noopener">GitHub</a>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
