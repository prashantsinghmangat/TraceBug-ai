<!DOCTYPE html>
<html>
<head>
  <title>Generate TraceBug Brand Icons</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0B0B10; color: #E0E0EE; padding: 2rem; }
    h2 { margin-bottom: 0.5rem; }
    .sub { color: #6B6B80; font-size: 0.85rem; margin-bottom: 2rem; }
    .icons { display: flex; gap: 2rem; align-items: flex-end; flex-wrap: wrap; margin-bottom: 2rem; }
    .icon-box { text-align: center; }
    .icon-box p { font-size: 0.8rem; color: #818CF8; margin-bottom: 8px; font-family: monospace; }
    canvas { border: 1px solid #1E1E2E; border-radius: 8px; }
    button { background: #818CF8; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600; }
    button:hover { background: #4F46E5; }
  </style>
</head>
<body>
<h2>TraceBug Brand Icons — “Prompt” mark</h2>
<p class="sub">Right-click each icon and "Save image as" to the icons/ folder, or click Download All. (CI regenerates these from the SVGs via sharp — this page is the manual fallback.)</p>
<div class="icons">
  <div class="icon-box"><p>icon16.png</p><canvas id="c16" width="16" height="16"></canvas></div>
  <div class="icon-box"><p>icon48.png</p><canvas id="c48" width="48" height="48"></canvas></div>
  <div class="icon-box"><p>icon128.png</p><canvas id="c128" width="128" height="128"></canvas></div>
</div>
<button onclick="downloadAll()">Download All Icons</button>

<script>
// "Prompt" mark: a terminal chevron + a violet→cyan cursor block in a deep
// rounded-square badge. Drawn in a 96-unit space, scaled to each canvas size.
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const k = s / 96;
  ctx.clearRect(0, 0, s, s);

  // Deep rounded-square badge
  roundRect(ctx, 3 * k, 3 * k, 90 * k, 90 * k, 22 * k);
  const bg = ctx.createLinearGradient(0, 0, s, s);
  bg.addColorStop(0, '#16163E');
  bg.addColorStop(1, '#0B0B10');
  ctx.fillStyle = bg;
  ctx.fill();

  // Terminal chevron
  ctx.beginPath();
  ctx.moveTo(30 * k, 33 * k);
  ctx.lineTo(47 * k, 48 * k);
  ctx.lineTo(30 * k, 63 * k);
  ctx.strokeStyle = '#EAECF3';
  ctx.lineWidth = 6 * k;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Cursor block (gradient)
  const cg = ctx.createLinearGradient(0, 0, s, s);
  cg.addColorStop(0, '#818CF8');
  cg.addColorStop(1, '#4F46E5');
  ctx.fillStyle = cg;
  roundRect(ctx, 52 * k, 41 * k, 14 * k, 14 * k, 4 * k);
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

drawIcon(document.getElementById('c16'));
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c128'));

function downloadAll() {
  ['c16', 'c48', 'c128'].forEach(id => {
    const canvas = document.getElementById(id);
    const a = document.createElement('a');
    a.download = 'icon' + canvas.width + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
